<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Range Sunday School — Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #121922;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.6);
      max-width: 520px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #4da3ff;
    }

    p {
      color: #c9d4e3;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .btn {
      display: block;
      margin: 12px 0;
      padding: 16px;
      background: #4da3ff;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      transition: transform .1s ease;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .secondary {
      background: #1e2a3a;
      color: white;
    }

    .note {
      margin-top: 22px;
      font-size: 13px;
      color: #8da2bd;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Range Sunday School™</h1>

    <p>
      Structured firearms training platform with automated
      progress tracking, coaching insights, and skill
      development paths.
    </p>

    <a class="btn" href="#">
      Instructor Dashboard
    </a>

    <a class="btn secondary" href="#">
      Shooter View
    </a>

    <a class="btn secondary" href="#">
      Demo Class Session
    </a>

    <div class="note">
      Demo branch — safe sandbox
    </div>

  </div>

</body>
</html>
