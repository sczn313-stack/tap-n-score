<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tap-n-Score Simulator</title>

<link rel="stylesheet" href="sim.css">

</head>

<body>

<h1>Tap-n-Score Simulator</h1>

<p class="subtitle">
Tap once for AIM then tap for bullet hits
</p>

<div class="sim-container">

<div id="target" class="target-area"></div>

<div class="controls">

<button onclick="calculate()">
Calculate POIB
</button>

<button class="reset" onclick="resetSim()">
Reset
</button>

</div>

<p id="result" class="results"></p>

</div>

<script src="sim.js"></script>

</body>
</html>
