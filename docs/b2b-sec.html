<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#06070a" />

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>B2B Dashboard — Tap-n-Score™</title>

  <link rel="stylesheet" href="./b2b.css?v=B2B-DASH-1" />
</head>
<body>
  <main class="dashPage">

    <header class="dashHeader">
      <button id="backBtn" class="iconBtn" type="button" aria-label="Back">‹</button>

      <div class="brandBlock">
        <div class="brandTitle">
          <span class="r">TAP</span><span class="w">-N-</span><span class="b">SCORE</span><span class="w">™</span>
        </div>
        <div class="drillTitle">BACK TO BASICS DRILL</div>
      </div>

      <div id="levelChip" class="levelChip">LEVEL 1</div>
    </header>

    <section class="topActions">
      <button id="historyBtn" class="historyBtn" type="button">History</button>
    </section>

    <section class="matrixCard">
      <div class="matrixScroll">
        <div id="matrixGrid" class="matrixGrid"></div>
      </div>
    </section>

    <section class="summaryRow">
      <div class="summaryCard">
        <div class="summaryLabel">LIFETIME BEST SCORE</div>
        <div id="bestScore" class="summaryValue">0/10</div>
      </div>

      <div class="summaryCard">
        <div class="summaryLabel">CURRENT LEVEL</div>
        <div id="levelStars" class="levelStars">★☆☆☆☆</div>
      </div>
    </section>

    <section class="ctaRow">
      <button id="newScanBtn" class="ctaBtn primary" type="button">📷 NEW SCAN</button>
      <button id="leaderboardBtn" class="ctaBtn" type="button">🏆 LEADERBOARD</button>
    </section>

  </main>

  <script defer src="./b2b.js?v=B2B-DASH-1"></script>
</body>
</html>
