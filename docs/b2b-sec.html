<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SEC Template</title>

  <!-- Use absolute paths -->
  <link rel="stylesheet" href="/docs/b2b-sec.css?v=10" />
</head>
<body>
  <main class="appShell">
    <header class="topHeader">
      <button class="miniBtn backBtn" id="backBtn" aria-label="Back">‹</button>

      <div class="secMark" aria-label="SEC">
        <span class="secR">S</span><span class="secW">E</span><span class="secB">C</span>
      </div>

      <div class="levelChip" id="levelChip">LEVEL 1</div>
    </header>

    <section class="subHeader">
      <div class="drillPill">
        <div class="drillTitleMain" id="drillTitle">Drill Name</div>
        <div class="drillTitleSub">
          <span class="subR">S</span><span class="subW">hooter </span><span class="subW">E</span><span class="subW">xperience </span><span class="subB">C</span><span class="subW">ard</span>
        </div>
      </div>

      <button class="historyBtn" id="historyBtn">History ›</button>
    </section>

    <section class="matrixCard">
      <div class="matrixHeader" id="matrixHeader"></div>
      <div class="matrixBody" id="matrixBody"></div>
    </section>

    <section class="summaryRow">
      <div class="summaryCard bestCard">
        <div class="summaryLabel">LIFETIME BEST SCORE</div>
        <div class="summaryValueWrap">
          <div class="summaryValue" id="lifetimeBest">0/10</div>
          <div class="bestBadge hidden" id="bestBadge">NEW BEST</div>
        </div>
        <div class="timeStamp" id="timeStamp">—</div>
      </div>

      <div class="summaryCard levelCard">
        <div class="summaryLabel" id="levelLabel">LEVEL 1</div>
        <div class="stars" id="levelStars">★☆☆☆☆</div>
        <div class="nextReq" id="nextReq">Complete 1 verified session</div>
        <div class="nextHint" id="nextHint">One more strong session moves you up.</div>
      </div>
    </section>

    <section class="actions actions3">
      <button class="actionBtn" id="newScanBtn">📷&nbsp;NEW SCAN</button>
      <button class="actionBtn" id="vendorBtn">🎯&nbsp;BUY MORE TARGETS LIKE THIS</button>
      <button class="actionBtn" id="surveyBtn">📝&nbsp;DO SURVEY</button>
    </section>
  </main>

  <!-- Use absolute paths -->
  <script src="/docs/drills.js?v=2"></script>
  <script src="/docs/b2b-sec.js?v=10"></script>
</body>
</html>
