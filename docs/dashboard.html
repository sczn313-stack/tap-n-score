<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCZN3 Analytics Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: #fff;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #67f3a4;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .card {
      background: #121922;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .label {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 6px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      color: #67f3a4;
    }

    .sub {
      font-size: 14px;
      opacity: 0.7;
    }

    .section {
      margin-top: 30px;
    }

    .list {
      margin-top: 10px;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .btn {
      margin-top: 20px;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #67f3a4;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="wrap">

  <h1>SCZN3 Live Analytics — Baker View</h1>

  <!-- TOP METRICS -->
  <div class="grid grid-4">
    <div class="card">
      <div class="label">Scans</div>
      <div class="value" id="scans">0</div>
    </div>

    <div class="card">
      <div class="label">Results</div>
      <div class="value" id="results">0</div>
    </div>

    <div class="card">
      <div class="label">Vendor Clicks</div>
      <div class="value" id="clicks">0</div>
    </div>

    <div class="card">
      <div class="label">Revenue</div>
      <div class="value" id="revenue">$0</div>
    </div>
  </div>

  <!-- CONVERSION -->
  <div class="section">
    <h1>Conversion</h1>

    <div class="grid grid-3">
      <div class="card">
        <div class="label">Scan → Results</div>
        <div class="value" id="scanResults">0%</div>
      </div>

      <div class="card">
        <div class="label">Results → Vendor</div>
        <div class="value" id="resultsVendor">0%</div>
      </div>

      <div class="card">
        <div class="label">Scan → Vendor</div>
        <div class="value" id="scanVendor">0%</div>
      </div>
    </div>
  </div>

  <!-- TOP SKUS -->
  <div class="section">
    <h1>Top Targets</h1>
    <div id="skuList" class="list"></div>
  </div>

  <!-- SESSION INTELLIGENCE -->
  <div class="section">
    <h1>Session Intelligence</h1>

    <div class="grid grid-3">
      <div class="card">
        <div class="label">Completed Sessions</div>
        <div class="value" id="completed">0</div>
      </div>

      <div class="card">
        <div class="label">Abandoned</div>
        <div class="value" id="abandoned">0</div>
      </div>

      <div class="card">
        <div class="label">Completion Rate</div>
        <div class="value" id="completionRate">0%</div>
      </div>
    </div>
  </div>

  <button class="btn" onclick="loadData()">Refresh</button>

</div>

<script>
const API = "https://tap-n-score-backend.onrender.com/api/analytics/summary";

async function loadData() {
  const res = await fetch(API + "?cb=" + Date.now());
  const data = await res.json();

  document.getElementById("scans").textContent = data.totals.scans;
  document.getElementById("results").textContent = data.totals.results_viewed;
  document.getElementById("clicks").textContent = data.totals.vendor_clicks;
  document.getElementById("revenue").textContent = "$" + data.revenue.total;

  document.getElementById("scanResults").textContent =
    data.conversion.scan_to_results_pct + "%";

  document.getElementById("resultsVendor").textContent =
    data.conversion.results_to_vendor_pct + "%";

  document.getElementById("scanVendor").textContent =
    data.conversion.scan_to_vendor_pct + "%";

  document.getElementById("completed").textContent =
    data.totals.sessions_completed;

  document.getElementById("abandoned").textContent =
    data.totals.sessions_abandoned;

  document.getElementById("completionRate").textContent =
    data.conversion.session_completion_pct + "%";

  // SKUs
  const skuList = document.getElementById("skuList");
  skuList.innerHTML = "";

  const skus = Object.entries(data.funnel.by_sku);

  skus.forEach(([key, val]) => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `
      <div>${key}</div>
      <div>${val.scans} scans</div>
    `;
    skuList.appendChild(div);
  });
}

loadData();
</script>

</body>
</html>
