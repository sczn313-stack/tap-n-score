<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SEC — Shooter Experience Card</title>
  <link rel="stylesheet" href="./sec.css?v=3007" />
</head>
<body>
  <div class="sec-app">

    <!-- PAGE 1 -->
    <section id="viewPrecision" class="view viewOn">
      <header class="topbar">
        <button id="backBtn" class="icon-btn" type="button" aria-label="Back">‹</button>

        <div class="brand-wrap">
          <div class="sec-logo" aria-label="SEC">
            <span class="s-red">S</span>
            <span class="e-white">E</span>
            <span class="c-blue">C</span>
          </div>
          <div class="brand-sub">Shooter Experience Card</div>
        </div>

        <div class="spacer"></div>
      </header>

      <div class="score-block glass-card">
        <div id="scoreValue" class="score-value">—</div>
        <div id="scoreBand" class="score-band scoreBandNeutral">—</div>
      </div>

      <div class="adjustments">
        <div class="adjust-card glass-card">
          <div class="adjust-label">WINDAGE</div>
          <div id="windageBig" class="adjust-value">0.00</div>
          <div id="windageDir" class="adjust-dir">—</div>
        </div>

        <div class="adjust-card glass-card">
          <div class="adjust-label">ELEVATION</div>
          <div id="elevationBig" class="adjust-value">0.00</div>
          <div id="elevationDir" class="adjust-dir">—</div>
        </div>
      </div>

      <div class="run-info glass-card">
        <div id="runDistance">—</div>
        <div id="runHits">—</div>
        <div id="runTime">—</div>
      </div>

      <div class="cta-wrap">
        <button id="toReportBtn" class="primary-btn" type="button">
          Unlock Full Report
        </button>
      </div>

      <div class="home-wrap">
        <button id="goHomeBtn" class="ghost-btn" type="button">
          New Target
        </button>
      </div>
    </section>

    <!-- PAGE 2 -->
    <section id="viewReport" class="view">
      <header class="topbar">
        <button id="backBtnReport" class="icon-btn" type="button" aria-label="Back">‹</button>

        <div class="brand-wrap">
          <div class="sec-logo" aria-label="SEC">
            <span class="s-red">S</span>
            <span class="e-white">E</span>
            <span class="c-blue">C</span>
          </div>
          <div class="brand-sub">Full Report</div>
        </div>

        <div class="spacer"></div>
      </header>

      <div class="report-wrap glass-card">
        <img id="secCardImg" alt="SEC Report Card" />
      </div>

      <div class="history-wrap glass-card">
        <div class="history-head">
          <div class="history-title">Recent Sessions</div>
          <div class="history-note">Last 3</div>
        </div>
        <div id="historyList" class="history-list"></div>
      </div>

      <div class="report-actions">
        <a id="vendorBtn" class="primary-btn" href="#" target="_blank" rel="noopener noreferrer">
          Visit Vendor
        </a>

        <a id="downloadBtn" class="ghost-btn" href="#" download="SEC_Report.png">
          Download SEC
        </a>

        <a id="surveyBtn" class="ghost-btn" href="#" target="_blank" rel="noopener noreferrer">
          Feedback
        </a>
      </div>
    </section>

  </div>

  <script src="./sec.js?v=3007"></script>
</body>
</html>
