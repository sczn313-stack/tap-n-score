<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SEC — Stable</title>
  <link rel="stylesheet" href="./sec.css" />
</head>

<body>
  <div class="sec-app">

    <!-- Header -->
    <header class="sec-header">
      <button id="backBtn">← Back</button>
      <h1>SEC</h1>
    </header>

    <!-- Score -->
    <section class="score-block">
      <div id="scoreValue">--</div>
      <div class="score-sub">
        Tighter group + closer to aim point = higher score
      </div>
    </section>

    <!-- Stats -->
    <section class="stats">

      <div class="stat">
        <div class="label">Shots</div>
        <div id="shotCount">--</div>
      </div>

      <div class="stat">
        <div class="label">Windage</div>
        <div id="windageClicks">--</div>
      </div>

      <div class="stat">
        <div class="label">Elevation</div>
        <div id="elevationClicks">--</div>
      </div>

    </section>

  </div>

  <script src="./sec.js?v=STABLE1"></script>
</body>
</html>
